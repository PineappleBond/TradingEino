# =============================================================================
# TradingEino Backend Configuration
# =============================================================================
# 配置文件说明:
# - 本文件为配置示例文件，实际使用时请复制为 config.yaml 并修改相应值
# - 配置项可以通过环境变量覆盖，格式：TRADINGEINO_<SECTION>_<KEY>
#   例如：TRADINGEINO_LOGGER_LEVEL=debug
# - 支持 YAML 格式，缩进使用空格（推荐 2 空格）
# =============================================================================

# -----------------------------------------------------------------------------
# Logger Configuration
# -----------------------------------------------------------------------------
# 日志配置，控制应用程序的日志行为
logger:
  # 日志级别：控制最低输出级别
  # 可选值: debug, info, warn, error
  # 说明:
  #   - debug: 输出所有日志，包括详细调试信息
  #   - info:  输出一般信息（推荐生产环境）
  #   - warn:  仅输出警告和错误
  #   - error: 仅输出错误信息
  # 环境变量: TRADINGEINO_LOGGER_LEVEL
  level: info

  # 日志输出目标
  # 可选值：stdout, stderr, file
  # 说明:
  #   - stdout: 标准输出（推荐，便于容器化部署）
  #   - stderr: 错误输出
  #   - file:  输出到文件（需同时配置 file_path）
  # 环境变量: TRADINGEINO_LOGGER_OUTPUT
  output: stdout

  # 日志文件路径
  # 仅在 output 为 "file" 时生效
  # 说明：路径相对于应用运行目录，建议使用绝对路径
  # 环境变量：TRADINGEINO_LOGGER_FILE_PATH
  # file_path: /var/log/tradingeino/app.log

  # 是否添加源代码位置信息
  # 可选值：true, false
  # 说明：开启后会在日志中输出文件名和行号，便于定位问题
  # 环境变量：TRADINGEINO_LOGGER_ADD_SOURCE
  add_source: true

# -----------------------------------------------------------------------------
# Database Configuration
# -----------------------------------------------------------------------------
# 数据库配置，用于配置数据存储
db:
  # 数据库类型
  # 可选值：sqlite
  # 说明：当前仅支持 SQLite
  # 环境变量：TRADINGEINO_DB_TYPE
  type: sqlite

  # 数据库文件路径
  # 说明：路径相对于应用运行目录，建议使用绝对路径
  # 环境变量：TRADINGEINO_DB_DB_PATH
  db_path: ./data/TradingEino.db

# -----------------------------------------------------------------------------
# Chat Model Configuration
# -----------------------------------------------------------------------------
# AI 聊天模型配置，用于 Agent 系统的 LLM 调用
chat_model:
  # API 密钥
  # 环境变量：TRADINGEINO_CHAT_MODEL_API_KEY
  api_key: your-api-key-here

  # API 基础 URL
  # 环境变量：TRADINGEINO_CHAT_MODEL_BASE_URL
  # 示例：https://api.openai.com/v1
  base_url: https://api.openai.com/v1

  # 模型名称
  # 环境变量：TRADINGEINO_CHAT_MODEL_MODEL
  # 示例：gpt-4o, gpt-3.5-turbo, claude-3-5-sonnet-20241022
  model: gpt-4o

# -----------------------------------------------------------------------------
# OKX Exchange Configuration
# -----------------------------------------------------------------------------
# OKX 交易所 API 配置，用于获取行情数据和交易执行
okx:
  # API Key
  # 环境变量：TRADINGEINO_OKX_API_KEY
  api_key: your-okx-api-key-here

  # Secret Key
  # 环境变量：TRADINGEINO_OKX_SECRET_KEY
  secret_key: your-okx-secret-key-here

  # Passphrase
  # 环境变量：TRADINGEINO_OKX_PASSPHRASE
  passphrase: your-okx-passphrase-here

  # 沙箱模式
  # 可选值：true, false
  # 说明：开启后使用 OKX Demo 服务器，不对接真实交易
  # 环境变量：TRADINGEINO_OKX_SANDBOX
  sandbox: true

# =============================================================================
# 示例：通过环境变量覆盖配置
# =============================================================================
# 在终端中执行:
#   export TRADINGEINO_LOGGER_LEVEL=debug
#   export TRADINGEINO_LOGGER_OUTPUT=stderr
#   ./server
#
# 或者直接在一行中:
#   TRADINGEINO_LOGGER_LEVEL=debug TRADINGEINO_LOGGER_OUTPUT=stderr ./server
# =============================================================================
